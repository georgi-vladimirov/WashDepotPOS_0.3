{% load l10n %}
<table class="table table-sm">
            <thead>
                <tr>
                    <th scope="col" class="text-center">Type</th>
                    <th scope="col" class="text-center">Amount</th>
                    <th scope="col" class="text-center">Payment Method</th>
                    <th scope="col" class="text-center">Payment Origin</th>
                    <th scope="col" class="text-center w-50">Details</th>
                    <th scope="col" class="text-center">
                        <i class="bi bi-trash3-fill"></i>
                    </th>
                </tr>
            </thead>
            <tbody class="table-group-divider">
                {% for transaction in transactions %}
                    <tr>
                        <td class="text-center">
                            <span class="badge {% if transaction.type == 'IN' %}text-bg-success {% elif transaction.type == 'OUT' %}text-bg-danger {% else %} text-bg-primary {% endif %} ">{{ transaction.type }}</span>
                        </td>
                        <td class="text-end">{{ transaction.amount|unlocalize }}</td>
                        <td class="text-center">{{ transaction.payment_method.name }}</td>
                        <td class="text-center">{{ transaction.payment_origin }}</td>
                        <td class="text-center">{{ transaction.details }}</td>
                        <td class="text-center">
                            <a type="button"
                               class="btn btn-danger btn-sm"
                               role="button"
                               href="{% url 'CashDesk:delete' transaction.id %}">
                                <i class="bi bi-trash3-fill"></i></a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

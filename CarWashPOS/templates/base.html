<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="Car Wash POS System - Professional car wash point of sale application" />
    <meta name="keywords"
          content="car wash, POS, point of sale, automotive, vehicle cleaning" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script defer
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      body {
        background-color: #dee2e6; /* Bootstrap $gray-300 */
    </style>
    <title>
      {% block title %}
        Document
      {% endblock title %}
    </title>
  </head>
  <body>
    {% block navbar %}
    {% endblock navbar %}
    {% if messages %}
      {% include "message_snippet.html" with messages=messages %}

    {% endif %}
    {% block content %}
    {% endblock content %}
  </body>
</html>
